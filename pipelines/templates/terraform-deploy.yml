parameters:
  - name: tfAction
    type: string
    default: apply
  - name: environment
    type: string
  - name: postgresLocation
    type: string
    default: westus2

steps:
  - task: AzureCLI@2
    displayName: Terraform Init & ${{ parameters.tfAction }}
    inputs:
      azureSubscription: azure-service-connection
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        # Install Terraform
        wget -q https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
        unzip -q terraform_1.7.5_linux_amd64.zip
        sudo mv terraform /usr/local/bin/

        # Set backend auth via service principal env vars
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_CLIENT_SECRET=$servicePrincipalKey
        export ARM_TENANT_ID=$tenantId
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        cd $(Build.SourcesDirectory)/infra/terraform

        terraform init \
          -backend-config="resource_group_name=eshop-tfstate-rg" \
          -backend-config="storage_account_name=eshoptfstate" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=eshop.terraform.tfstate"

        terraform ${{ parameters.tfAction }} \
          -var="environment=${{ parameters.environment }}" \
          -var="postgres_location=${{ parameters.postgresLocation }}" \
          -auto-approve
