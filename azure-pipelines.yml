trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md

pr:
  branches:
    include:
      - main

variables:
  acrName: eshopdevacr
  imageTag: $(Build.BuildId)
  dotnetVersion: '10.0.x'
  keyVaultName: eshop-dev-kv        # created by Terraform in Stage 1

stages:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Infra (Terraform)
# Provisions AKS, ACR, Postgres, Redis, RabbitMQ, Key Vault
# Passwords are auto-generated by Terraform random_password — no human input
# ─────────────────────────────────────────────────────────────────────────────
- stage: Infra
  displayName: 1 - Provision Infrastructure
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: Terraform
    pool:
      vmImage: ubuntu-latest
    steps:
    - template: pipelines/templates/terraform-deploy.yml
      parameters:
        tfAction: apply
        environment: dev
        postgresLocation: westus2

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Build & Test
# Runs on every push and every PR — no secrets needed here
# ─────────────────────────────────────────────────────────────────────────────
- stage: Build
  displayName: 2 - Build & Test
  dependsOn: []
  jobs:
  - job: BuildAndTest
    pool:
      vmImage: ubuntu-latest
    steps:

    - task: UseDotNet@2
      displayName: Install .NET 10
      inputs:
        packageType: sdk
        version: $(dotnetVersion)
        includePreviewVersions: true

    - script: dotnet restore eShop.slnx
      displayName: Restore

    - script: dotnet build eShop.slnx --no-restore -c Release
      displayName: Build

    - script: |
        dotnet test tests/ -c Release \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/TestResults \
          --collect:"XPlat Code Coverage" \
          --ignore-exit-code 5
      displayName: Test

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'

    - task: PublishCodeCoverageResults@2
      condition: always()
      inputs:
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Docker Build & Push to ACR
# No secrets needed — uses federated identity (acr-service-connection)
# ─────────────────────────────────────────────────────────────────────────────
- stage: DockerPush
  displayName: 3 - Build & Push Docker Images
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: PushImages
    pool:
      vmImage: ubuntu-latest
    steps:

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: webapp
        dockerfilePath: src/WebApp/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: catalog-api
        dockerfilePath: src/Catalog.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: basket-api
        dockerfilePath: src/Basket.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: ordering-api
        dockerfilePath: src/Ordering.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: identity-api
        dockerfilePath: src/Identity.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: webhooks-api
        dockerfilePath: src/Webhooks.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: order-processor
        dockerfilePath: src/OrderProcessor/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: payment-processor
        dockerfilePath: src/PaymentProcessor/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Deploy to AKS
# Secrets fetched at runtime from Key Vault — never stored in pipeline
# ─────────────────────────────────────────────────────────────────────────────
- stage: Deploy
  displayName: 4 - Deploy to AKS
  dependsOn:
    - Infra
    - DockerPush
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToAKS
    pool:
      vmImage: ubuntu-latest
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:

          # Pull secrets from Key Vault at runtime — no plaintext anywhere
          - task: AzureKeyVault@2
            displayName: Fetch secrets from Key Vault
            inputs:
              azureSubscription: azure-service-connection
              KeyVaultName: $(keyVaultName)
              SecretsFilter: 'db-password,redis-password,rabbitmq-password'
              RunAsPreJob: false

          - task: AzureCLI@2
            displayName: Get AKS credentials
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group eshop-dev-rg \
                  --name eshop-dev-aks \
                  --overwrite-existing

          # Inject Key Vault secrets as Kubernetes secrets — never logged
          - task: AzureCLI@2
            displayName: Create K8s secrets from Key Vault
            env:
              DB_PASSWORD: $(db-password)
              REDIS_PASSWORD: $(redis-password)
              RABBITMQ_PASSWORD: $(rabbitmq-password)
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                kubectl create secret generic eshop-secrets \
                  --from-literal=db-password="$DB_PASSWORD" \
                  --from-literal=redis-password="$REDIS_PASSWORD" \
                  --from-literal=rabbitmq-password="$RABBITMQ_PASSWORD" \
                  --dry-run=client -o yaml | kubectl apply -f -

          - script: |
              for service in webapp catalog-api basket-api ordering-api identity-api webhooks-api order-processor payment-processor; do
                kubectl set image deployment/$service \
                  $service=$(acrName).azurecr.io/$service:$(imageTag)
              done
            displayName: Update image tags on AKS

          - script: kubectl rollout status deployment --timeout=5m
            displayName: Wait for rollout
