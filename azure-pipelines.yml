trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md

pr:
  branches:
    include:
      - main

variables:
  acrName: eshopdevacr
  imageTag: $(Build.BuildId)
  dotnetVersion: '10.0.x'
  keyVaultName: eshop-dev-kv
  terraformVersion: '1.7.5'
  tfEnvironment: dev
  tfPostgresLocation: eastus
  # ⚠️  Set to 'true' when manually queuing to run the Destroy stage
  RUN_DESTROY: 'false'

stages:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Terraform Init + Plan + Apply
# Runs first — provisions all Azure infrastructure before the app is built.
# (ACR, AKS, PostgreSQL, Redis, Service Bus, Key Vault)
# ─────────────────────────────────────────────────────────────────────────────
- stage: TerraformProvision
  displayName: 1 - Terraform Init + Plan + Apply
  dependsOn: []
  condition: not(eq(variables['RUN_DESTROY'], 'true'))
  jobs:
  - job: TerraformApply
    pool:
      vmImage: ubuntu-latest
    steps:

    - checkout: self

    # ── Step 1: Init ──────────────────────────────────────────────────────────
    - task: AzureCLI@2
      displayName: Terraform Init
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          wget -q https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
          unzip -q terraform_$(terraformVersion)_linux_amd64.zip
          sudo mv terraform /usr/local/bin/

          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          cd $(Build.SourcesDirectory)/infra/terraform
          terraform init \
            -backend-config="resource_group_name=eshop-tfstate-rg" \
            -backend-config="storage_account_name=eshoptfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=eshop.terraform.tfstate"

    # ── Step 2: Plan ─────────────────────────────────────────────────────────
    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          cd $(Build.SourcesDirectory)/infra/terraform
          terraform plan \
            -var="environment=$(tfEnvironment)" \
            -var="postgres_location=$(tfPostgresLocation)" \
            -out=tfplan \
            -detailed-exitcode || EXIT=$?
          # exit 0 = no changes, exit 2 = changes pending (both OK)
          if [ "${EXIT:-0}" -eq 1 ]; then exit 1; fi

    # ── Step 3: Apply ────────────────────────────────────────────────────────
    - task: AzureCLI@2
      displayName: Terraform Apply
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          cd $(Build.SourcesDirectory)/infra/terraform
          terraform apply -auto-approve tfplan

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Build & Test
# ─────────────────────────────────────────────────────────────────────────────
- stage: Build
  displayName: 2 - Build & Test
  dependsOn: TerraformProvision
  condition: succeeded('TerraformProvision')
  jobs:
  - job: BuildAndTest
    pool:
      vmImage: ubuntu-latest
    steps:

    - task: UseDotNet@2
      displayName: Install .NET 10
      inputs:
        packageType: sdk
        version: $(dotnetVersion)
        includePreviewVersions: true

    - script: dotnet restore eShop.Web.slnf
      displayName: Restore

    - script: dotnet build eShop.Web.slnf --no-restore -c Release
      displayName: Build

    - script: |
        dotnet test eShop.Web.slnf -c Release \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/TestResults \
          --collect:"XPlat Code Coverage" || true
      displayName: Test

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'

    - task: PublishCodeCoverageResults@2
      condition: always()
      inputs:
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Docker Build & Push to ACR
# ─────────────────────────────────────────────────────────────────────────────
- stage: DockerPush
  displayName: 3 - Build & Push Docker Images
  dependsOn: Build
  jobs:
  - job: PushImages
    pool:
      vmImage: ubuntu-latest
    steps:

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: webapp
        dockerfilePath: src/WebApp/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: catalog-api
        dockerfilePath: src/Catalog.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: basket-api
        dockerfilePath: src/Basket.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: ordering-api
        dockerfilePath: src/Ordering.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: identity-api
        dockerfilePath: src/Identity.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: webhooks-api
        dockerfilePath: src/Webhooks.API/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: order-processor
        dockerfilePath: src/OrderProcessor/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

    - template: pipelines/templates/docker-build-push.yml
      parameters:
        serviceName: payment-processor
        dockerfilePath: src/PaymentProcessor/Dockerfile
        acrName: $(acrName)
        imageTag: $(imageTag)

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Deploy to AKS
# ─────────────────────────────────────────────────────────────────────────────
- stage: Deploy
  displayName: 4 - Deploy to AKS
  dependsOn: DockerPush
  jobs:
  - deployment: DeployToAKS
    pool:
      vmImage: ubuntu-latest
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Get AKS credentials
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group eshop-dev-rg \
                  --name eshop-dev-aks \
                  --overwrite-existing

          - script: kubectl apply -f k8s/deployments.yml
            displayName: Apply K8s manifests

          - task: AzureCLI@2
            displayName: Create K8s secrets from Key Vault
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                PG_HOST=$(az postgres flexible-server list -g eshop-dev-rg --query "[0].fullyQualifiedDomainName" -o tsv)
                PG_PASS=$(az keyvault secret show --vault-name eshop-dev-kv --name db-password --query value -o tsv)
                REDIS_NAME=$(az redis list -g eshop-dev-rg --query "[0].name" -o tsv)
                REDIS_HOST=$(az redis list -g eshop-dev-rg --query "[0].hostName" -o tsv)
                REDIS_KEY=$(az redis list-keys --name $REDIS_NAME -g eshop-dev-rg --query primaryKey -o tsv)

                PG_CONNSTR_BASE="SSL Mode=Require"

                kubectl create secret generic eshop-secrets \
                  --from-literal=catalog-db-connstr="Host=$PG_HOST;Database=CatalogDB;Username=psqladmin;Password=$PG_PASS;$PG_CONNSTR_BASE" \
                  --from-literal=ordering-db-connstr="Host=$PG_HOST;Database=OrderingDB;Username=psqladmin;Password=$PG_PASS;$PG_CONNSTR_BASE" \
                  --from-literal=identity-db-connstr="Host=$PG_HOST;Database=IdentityDB;Username=psqladmin;Password=$PG_PASS;$PG_CONNSTR_BASE" \
                  --from-literal=webhooks-db-connstr="Host=$PG_HOST;Database=WebhooksDB;Username=psqladmin;Password=$PG_PASS;$PG_CONNSTR_BASE" \
                  --from-literal=redis-connstr="$REDIS_HOST:6380,password=$REDIS_KEY,ssl=True" \
                  --dry-run=client -o yaml | kubectl apply -f -

          - script: |
              for service in webapp catalog-api basket-api ordering-api identity-api webhooks-api order-processor payment-processor; do
                kubectl set image deployment/$service \
                  $service=$(acrName).azurecr.io/$service:$(imageTag)
              done
            displayName: Update image tags on AKS

          - script: kubectl rollout status deployment --timeout=5m
            displayName: Wait for rollout

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5 — Terraform Destroy  ⚠️  MANUAL ONLY
#
# This stage NEVER runs automatically.
# To trigger it:
#   1. Go to Azure Pipelines → Run pipeline
#   2. Set variable  RUN_DESTROY = true
#   3. Queue the run — all other stages will be skipped
#   4. Approve the 'destroy-approval' environment gate when prompted
#
# This will permanently delete ALL Azure resources for the environment.
# ─────────────────────────────────────────────────────────────────────────────
- stage: TerraformDestroy
  displayName: "⚠️ MANUAL — Terraform Destroy"
  dependsOn: []                                      # independent — no prerequisite stages
  condition: eq(variables['RUN_DESTROY'], 'true')    # only runs when explicitly requested
  jobs:
  - deployment: DestroyInfrastructure
    pool:
      vmImage: ubuntu-latest
    environment: destroy-approval                    # configure manual approval gate in Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          # ── Init (required before destroy) ───────────────────────────────
          - task: AzureCLI@2
            displayName: Terraform Init
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                wget -q https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
                unzip -q terraform_$(terraformVersion)_linux_amd64.zip
                sudo mv terraform /usr/local/bin/

                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                cd $(Build.SourcesDirectory)/infra/terraform
                terraform init \
                  -backend-config="resource_group_name=eshop-tfstate-rg" \
                  -backend-config="storage_account_name=eshoptfstate" \
                  -backend-config="container_name=tfstate" \
                  -backend-config="key=eshop.terraform.tfstate"

          # ── Plan Destroy (shows what will be deleted before acting) ───────
          - task: AzureCLI@2
            displayName: Terraform Plan Destroy (preview)
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                cd $(Build.SourcesDirectory)/infra/terraform
                echo "======================================"
                echo "  RESOURCES THAT WILL BE DESTROYED"
                echo "======================================"
                terraform plan -destroy \
                  -var="environment=$(tfEnvironment)" \
                  -var="postgres_location=$(tfPostgresLocation)"

          # ── Destroy ──────────────────────────────────────────────────────
          - task: AzureCLI@2
            displayName: "⚠️ Terraform Destroy — IRREVERSIBLE"
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                cd $(Build.SourcesDirectory)/infra/terraform
                terraform destroy \
                  -var="environment=$(tfEnvironment)" \
                  -var="postgres_location=$(tfPostgresLocation)" \
                  -auto-approve

                echo "All infrastructure destroyed successfully."
