services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ── Services ─────────────────────────────────────────────────────────────────

  identity-api:
    build:
      context: .
      dockerfile: src/Identity.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDB: "Host=postgres;Database=IdentityDB;Username=postgres;Password=postgres"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy

  catalog-api:
    build:
      context: .
      dockerfile: src/Catalog.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogDB: "Host=postgres;Database=CatalogDB;Username=postgres;Password=postgres"
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  basket-api:
    build:
      context: .
      dockerfile: src/Basket.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
      Identity__Url: http://identity-api:8080
    ports:
      - "5003:8080"
      - "5004:8081"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ordering-api:
    build:
      context: .
      dockerfile: src/Ordering.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderingDB: "Host=postgres;Database=OrderingDB;Username=postgres;Password=postgres"
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
      Identity__Url: http://identity-api:8080
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  webhooks-api:
    build:
      context: .
      dockerfile: src/Webhooks.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__WebhooksDB: "Host=postgres;Database=WebhooksDB;Username=postgres;Password=postgres"
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
      Identity__Url: http://identity-api:8080
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-processor:
    build:
      context: .
      dockerfile: src/OrderProcessor/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderingDB: "Host=postgres;Database=OrderingDB;Username=postgres;Password=postgres"
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-processor:
    build:
      context: .
      dockerfile: src/PaymentProcessor/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
    depends_on:
      rabbitmq:
        condition: service_healthy

  webapp:
    build:
      context: .
      dockerfile: src/WebApp/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      IdentityUrl: http://identity-api:8080
      CallBackUrl: http://localhost:8080/
      ConnectionStrings__EventBus: "amqp://guest:guest@rabbitmq:5672"
      # Service discovery overrides — map Aspire names to compose hostnames
      services__catalog-api__http__0: http://catalog-api:8080
      services__basket-api__http__0: http://basket-api:8080
      services__basket-api__grpc__0: http://basket-api:8081
      services__ordering-api__http__0: http://ordering-api:8080
      services__identity-api__http__0: http://identity-api:8080
      services__webhooks-api__http__0: http://webhooks-api:8080
    ports:
      - "8080:8080"
    depends_on:
      - catalog-api
      - basket-api
      - ordering-api
      - identity-api

volumes:
  postgres_data:
