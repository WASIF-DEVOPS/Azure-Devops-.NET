# ──────────────────────────────────────────────────────────────────────────────
# Prometheus — Metrics Collection
# Scrapes metrics from OTel Collector's Prometheus exporter endpoint
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: eshop
  labels:
    app: prometheus
    app.kubernetes.io/part-of: eshop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape OTel Collector's Prometheus exporter
      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector.eshop.svc.cluster.local:8889"]

      # Scrape Istio Envoy sidecar metrics
      - job_name: "envoy-stats"
        metrics_path: /stats/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["eshop"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: ".*-envoy-prom"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: eshop
  labels:
    app: prometheus
    tier: observability
    app.kubernetes.io/part-of: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        tier: observability
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: eshop
  labels:
    app: prometheus
    tier: observability
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
