# ──────────────────────────────────────────────────────────────────────────────
# eShop Database & Service Secrets
# ──────────────────────────────────────────────────────────────────────────────
# WARNING: This is a TEMPLATE. Do NOT commit real credentials to Git.
#
# In production, secrets are populated by the Azure DevOps pipeline
# which reads them from Azure Key Vault (provisioned by Terraform)
# and creates/updates this Secret via:
#   kubectl create secret generic eshop-secrets --from-literal=...
#
# For local development, replace the placeholder values below and apply:
#   kubectl apply -f database/secrets.yaml
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: eshop-secrets
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    tier: database
type: Opaque
stringData:
  # PostgreSQL connection strings
  catalog-db: "Host=<POSTGRES_HOST>;Database=CatalogDB;Username=psqladmin;Password=<DB_PASSWORD>"
  ordering-db: "Host=<POSTGRES_HOST>;Database=OrderingDB;Username=psqladmin;Password=<DB_PASSWORD>"
  identity-db: "Host=<POSTGRES_HOST>;Database=IdentityDB;Username=psqladmin;Password=<DB_PASSWORD>"
  webhooks-db: "Host=<POSTGRES_HOST>;Database=WebhooksDB;Username=psqladmin;Password=<DB_PASSWORD>"

  # Redis connection string
  redis: "<REDIS_HOST>:6380,password=<REDIS_PASSWORD>,ssl=True,abortConnect=False"
