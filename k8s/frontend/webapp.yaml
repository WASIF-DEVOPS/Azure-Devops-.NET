apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: eshop
  labels:
    app: webapp
    tier: frontend
    app.kubernetes.io/part-of: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
        tier: frontend
    spec:
      containers:
        - name: webapp
          image: eshopdevacr.azurecr.io/webapp:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            # ── OpenTelemetry ──────────────────────────────────────
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.eshop.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: webapp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=dev,service.namespace=eshop
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: eshop
  labels:
    app: webapp
    tier: frontend
spec:
  type: ClusterIP
  selector:
    app: webapp
  ports:
    - port: 80
      targetPort: 8080
