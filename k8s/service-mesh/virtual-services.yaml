# ──────────────────────────────────────────────────────────────────────────────
# Istio VirtualServices — Retries, Timeouts & Traffic Management
# Ready for future canary deployments via traffic splitting
# ──────────────────────────────────────────────────────────────────────────────

# ── Catalog API ───────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: catalog-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
spec:
  hosts:
    - catalog-api
  http:
    - route:
        - destination:
            host: catalog-api
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: 5xx,reset,connect-failure,retriable-4xx
---
