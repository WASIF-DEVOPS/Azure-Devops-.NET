# ──────────────────────────────────────────────────────────────────────────────
# Istio DestinationRules — Circuit Breakers & Connection Pools
# Protects services from cascading failures
# ──────────────────────────────────────────────────────────────────────────────

# ── Catalog API ───────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: catalog-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
spec:
  host: catalog-api.eshop.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
